name: iOS Build

on:
  workflow_dispatch:
    inputs:
      ios_build_number:
        description: "iOS build number"
        required: false
        type: string
      version_label:
        description: "Version label"
        required: false
        type: string

concurrency: ios-build

jobs:
  build-ios:
    name: Build iOS
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install Node dependencies
        run: npm ci

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Configure SSH for match repository
        run: |
          if [ -z "$MATCH_GIT_PRIVATE_KEY" ]; then
            echo "Missing MATCH_GIT_PRIVATE_KEY secret."
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$MATCH_GIT_PRIVATE_KEY" > ~/.ssh/match_key
          chmod 600 ~/.ssh/match_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          cat > ~/.ssh/config <<'EOF'
          Host github.com
            IdentityFile ~/.ssh/match_key
            IdentitiesOnly yes
            StrictHostKeyChecking yes
          EOF
        env:
          MATCH_GIT_PRIVATE_KEY: ${{ secrets.MATCH_GIT_PRIVATE_KEY }}

      - name: Run Fastlane iOS build
        env:
          IOS_BUILD_NUMBER: ${{ github.event.inputs.ios_build_number }}
          VERSION_LABEL: ${{ github.event.inputs.version_label }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_API_KEY_BASE64: ${{ secrets.APPSTORE_API_KEY_BASE64 }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          IOS_PROFILE_NAME: ${{ secrets.IOS_PROFILE_NAME }}
        run: bundle exec fastlane ios ci_ios

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: /Users/runner/Library/Logs/gym/Yuzic-Yuzic.log

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: yuzic-ios
          path: build/ios/*.ipa
