name: Android Build

on:
  workflow_dispatch:
    inputs:
      android_version_code:
        description: "Android versionCode"
        required: false
        type: string
      version_label:
        description: "Version label"
        required: false
        type: string

concurrency: android-build

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/**/*.gradle*') }}
          restore-keys: gradle-

      - name: Install Node dependencies
        run: npm ci

      - name: Decode Android keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.jks

      - name: Run Fastlane Android build
        env:
          ANDROID_VERSION_CODE: ${{ github.event.inputs.android_version_code || github.run_number }}
          VERSION_LABEL: ${{ github.event.inputs.version_label }}
          ANDROID_KEYSTORE_PATH: release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          GOOGLE_PLAY_JSON_KEY: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
        run: bundle exec fastlane android ci_android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: yuzic-android-apk
          path: android/app/build/outputs/**/*.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: yuzic-android-aab
          path: android/app/build/outputs/**/*.aab
