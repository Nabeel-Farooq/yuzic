// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  ext {
    // Exposed so that Expo library modules can read rootProject.ext.kotlinVersion
    // instead of falling back to their own outdated default (e.g. "1.6.10").
    kotlinVersion = rootProject.properties['android.kotlinVersion'] ?: '2.0.21'
  }

  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:${kotlinVersion}")
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

subprojects {
  afterEvaluate { project ->
    project.tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
      kotlinOptions {
        jvmTarget = "17"
      }
    }
    if (project.hasProperty('android')) {
      project.android {
        if (compileOptions) {
          compileOptions {
            sourceCompatibility JavaVersion.VERSION_17
            targetCompatibility JavaVersion.VERSION_17
          }
        }
      }
    }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
